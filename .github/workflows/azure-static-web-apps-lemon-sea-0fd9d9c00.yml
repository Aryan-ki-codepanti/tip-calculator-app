# GitHub Actions workflow to build and deploy a static site to GitHub Pages
# Fixes the Node.js OpenSSL unsupported error

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger deployment on push to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      # Fix OpenSSL 3 compatibility issues in Node.js >=17
      NODE_OPTIONS: --openssl-legacy-provider

    steps:
      # Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # Setup Node.js (adjust version as needed)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18   # or 16 to avoid this error entirely
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build site
      - name: Build project
        run: npm run build

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist  # adjust if your build directory is different
